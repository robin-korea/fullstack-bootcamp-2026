	<div class="group">
		<label for="txtContent">내용 입력</label>

	<br>
	<button class="add">실행(exec)</button>
	<br>
	<div id="demo" class="code">결과: </div>

<script>
	// let, var, const 키워드를 사용해서 변수를 선언할 수 있다.
	const txtContent = document.getElementById("txtContent");
	const btnExec = document.querySelector("body > div > button.add");
	const demo = document.getElementById("demo");
	
	btnExec.addEventListener("click", function(){
		let content = txtContent.value;
		/* let demoText = demo.innerText; */
		demo.innerHTML = `결과: <span style='color:red; font-size: 20px;'>${content}</span>`;
		
		/* txtContent.focus();
		txtContent.select(); */
		txtContent.focus();
		txtContent.select();
	});
	
	txtContent.addEventListener("keydown", function(e){
		// e.preventDefault(); // 기본 기능 취소

		// console.log(e.keyCode);
		/*
		if(e.keyCode == 13){

		*/
		if (e.key == "Enter"){
			btnExec.click();
		}
	});
