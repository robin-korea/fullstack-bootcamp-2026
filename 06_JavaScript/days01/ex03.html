div#demo {
	border: solid 1px gray;
	height: 100px;
	overflow: auto;
}

div.item {
	color: red;
	background-color: yellow;
}
</style>
</head>
<body>
	<header>
		<h1 class="main">
			<a href="#" style="position: absolute; top: 30px;">My Home</a>
		</h1>
		<ul>
			<li><a href="#">로그인</a></li>
			<li><a href="#">회원가입</a></li>
		</ul>
	</header>
	<div>
		<xmp class="code"> </xmp>

		<label for="name">이름 입력: </label> <input type="text" id="name"
			name="name" autofocus="autofocus"> <br> <br>
		<div class="group">
			<button class="add">추가</button>
			<button class="edit">수정</button>
			<button class="del">삭제</button>
			<button class="search">검색</button>
			<button class="alldel">모두 삭제</button>
		</div>
		<br>
		<div id="demo">
			<div onclick='item_click();'>홍길동</div>
			<div onclick='item_click();'>서영학</div>
			<div onclick='item_click();'>정창기</div>
			<div onclick='item_click();'>김병훈</div>
		</div>
	</div>

	<script>
	const txtName = document.getElementById("name");
	const btnAdd = document.querySelector("div.group > button.add");
	const btnEdit = document.querySelector("div.group > button.edit");
	const btnDel = document.querySelector("div.group > button.del");
	const btnSearch = document.querySelector("div.group > button.search");
	const btnAlldel = document.querySelector("div.group > button.alldel");
	const demo = document.getElementById("demo");
	
	// 검색기능
	btnSearch.addEventListener("click", function(){
		itemSearch();
	});
	
	function itemSearch(){
	    let searchWord = txtName.value;
	    let count = 0;

	    for (var i = 0; i < demo.children.length; i++) {

	        const item = demo.children[i];

	        item.classList.remove("item");

	        let itemName = item.innerText;

	        if (itemName.includes(searchWord)) {
	            item.classList.add("item");
	            count++;
	        }
	    }

	    alert(`'${searchWord}'를 ${count}개 찾았습니다.`);
	}
	
	/* function itemSearch(){
		
		let keyword = txtName.value;
		
		if(!keyword){
			alert("검색할 이름을 입력해 주세요!!!");
			txtName.focus();
			return;
		}
		
		let count = 0;
		
		for (var i = 0; i < demo.children.length; i++) {
			const item = demo.children[i];
			
			if(item.innerText.includes(keyword)){
				item.style.display = "";
				count++;
			}else{
				item.style.display = "none";
			}
		}
		
		if (count == 0){
			alert("검색 결과가 없습니다!!");
		}
		
	}; */
	
	
	// 모두 삭제 버튼을 클릭할 떄
	btnAlldel.addEventListener("click",function(){
		itemAllDel();
	});
	
	function itemAllDel() {
		if(confirm("정말 모두 삭제할까요?")){			
			demo.innerHTML = "";
		}
	};
	
	// 삭제 버튼을 클릭할 떄
	btnDel.addEventListener("click",function(){
		itemDel();
	});
	
	function itemDel(){
		// undefined, null, "", 0 : false
		if(!updateItemDiv){
			alert("삭제할 단어를 선택해주세요!");
			return;
		}
		
		if(confirm("정말 삭제할까요?")){			
			updateItemDiv.remove();
			updateItemDiv = null;
		}
	}
	
	// 수정 버튼을 클릭할 때
	btnEdit.addEventListener("click",function(){
		itemEdit();
	});
	
	function itemEdit(){
		updateItemDiv.innerText = txtName.value;
	};
	
	// 추가 버튼을 클릭할 때
	btnAdd.addEventListener("click",function(){
		itemAdd();
	});
	
	function itemAdd(){
		let name = txtName.value.trim();
		if(name == ""){
			alert("이름은 필수 입력 항목입니다!");
			txtName.value = "";
			txtName.focus();
			return;
		}
		
		// 이전 입력된 이름 div에서 item 클래스 속성 제거
		// console.log(demo.children);
		 /* 1) Array.from(demo.children).forEach();
		 2) for (let itemDiv of demo.children) { } */
		
		 for (var i = 0; i < demo.children.length; i++) {
			 demo.children[i].classList.remove("item");
		}
		
		
		/* const divItems = document.querySelectorAll("#demo > div.item");
		divItems.forEach(item => {
			item.classList.remove("item");
		}); */
		
		demo.innerHTML += `<div class="item" onclick='item_click();'>${name}</div>`;
		
		// [1]
		// demo.scrollTop = demo.scrollHeight;
		
		 // [2] 부드럽게 스크롤 이동     
      	const observer = new MutationObserver((mutationsList, observer) => {
      	for (const mutation of mutationsList) {
         	if (mutation.type === 'childList' && mutation.addedNodes.length > 0) {
             // demo.scrollTop = demo.scrollHeight;
            	demo.scrollTo({
                  	top: demo.scrollHeight,
                  	behavior: 'smooth'
                	});
         	}
       	}
      });
   
      	observer.observe(demo, { childList: true });
		txtName.focus();
		txtName.select();
		//txtName.setSelectionRange(2,5);
	};
	
	txtName.addEventListener("keydown", function(e){
		if(e.key == "Enter"){
			itemAdd();
		}
	});
	
	let updateItemDiv;
	
	function item_click(){
		for (var i = 0; i < demo.children.length; i++) {
			 demo.children[i].classList.remove("item");
		}
		updateItemDiv = event.srcElement;
		updateItemDiv.classList.add("item");
		txtName.value = updateItemDiv.innerText;
	}
	
</script>
