<div>
	<xmp class="code">
	</xmp>
	
	<label for="n">정수 n 입력: </label>
	<input type="text" id = "n" class="short" autofocus="autofocus">
	
	<p id="demo" style="color:red"></p>
	
</div>
<script>
	const inputNum = document.getElementById("n");
	const demo = document.getElementById("demo");
	
	inputNum.addEventListener("keydown", function(e){
		if( e.key == 'Enter'){
			
			const n = Number(inputNum.value);
			
			if(!Number.isInteger(n) || n < 1){
				alert("1 이상의 정수를 입력하세요");
				inputNum.value = "";
				inputNum.focus();
				return;
			}
			
			let sum = 0;
			let text = "";
				
			for (let i = 1; i <= n; i++) {
				sum += i;
				text += i;
				
				if(i < n){
					text += "+";
				}
			}
			demo.innerText = `${text} = ${sum}`;
		}
	})
</script>
</body>
