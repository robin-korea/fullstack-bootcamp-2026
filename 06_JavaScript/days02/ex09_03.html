<body>
<header>
  <h1 class="main"><a href="#" style="position: absolute;top:30px;">My Home</a></h1>
  <ul>
    <li><a href="#">로그인</a></li>
    <li><a href="#">회원가입</a></li>
  </ul>
</header>
<div>
  <xmp class="code">  
  </xmp>  
  <label for="n">정수 n 입력: </label>
  <input type="text" id="n" class="short" autofocus="autofocus">  
  <p id="demo" style="color:red"></p>  
</div>

<script>
   let txtN = document.querySelector("#n");
   let pDemo = document.querySelector("#demo");
   
   txtN.addEventListener("keydown", function (e){
      if( e.key == 'Enter' ){
        // alert( txtN.value  +" / " + this.value + " / " + event.target.value );
        let n = this.value.trim();
        
        // 유효성 검사 if 모두 삭제
        let regexp = /^[1-9]\d*$/;
        if (  !regexp.test( n )  ) {
         alert("1이상의 정수만 입력하세요!!!");
         txtN.focus();
         txtN.select();
         return;
        } // if
        
        // 1+2+..+10=55
        let content = "";
        let sum = 0;
        for (var i = 1; i <= n; i++) {
           sum += i;
           content += i +  ( i==n ? "" : "+" );           
        }
        content += "=" + sum;
        pDemo.innerText = content;
        
        
      } // if
   })
</script>
</body>
