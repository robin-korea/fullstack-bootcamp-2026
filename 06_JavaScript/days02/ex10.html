<div>
	<xmp class="code">
	  [js 동적 요소 생성, 추가, 수정, 삭제]
	  생성: createElement()
	  추가: appendChild(), insertBefore();

	좋아하는 과목을 선택하세요? 
	<br>
	<select id="subject" name="subject">
		<option>선택하세요...</option>
	</select>
	<br>
	<button>확인</button>
	<p id="demo">eng / 영어</p>
</div>

<script>
	const subject = document.getElementById("subject");
	// [2]                   text  value
	/*
	subject[1] = new Option("국어", "kor");
	subject[2] = new Option("영어", "eng");
	subject[3] = new Option("수학", "mat");
	*/
	// js 배열 선언 opArr
	const opArr = ["kor", "eng", "mat"]
	const opTextArr = ["국어","영어","수학"]
	opArr.forEach((element, index)=>{
		subject[index+1] = new Option(opTextArr[index], opArr[index]);
	});
	
	
	/* [1] 풀이
	const op = document.createElement("option");
	op.setAttribute("value","kor");
	op.innerText = "국어";
	
	subject.appendChild(op);
	*/
	
	// [2] 풀이
	document.querySelector("button").onclick = function(){
		
		// options 컬렉션
		// selectedOptions 컬렉션: 선택된 모든 options 컬렉션
		const selOpt = subject.selectedOptions[0];
		let value = selOpt.value;
		
		if(value == "선택하세요..."){
			alert("과목을 선택하세요!!");
			return;	
		}
		
		let text = selOpt.text;
		
		// alert(value + " / " + text);
		
		document.getElementById("demo").innerText = value + " / " + text;
	}
	
	/* [1] 풀이
	document.querySelector("button").onclick = function(){

			alert("과목을 선택하세요!!");
			return;	
		}
		
		const selOpt = subject.options[index];
		let value = selOpt.value;
		let text = selOpt.text;
		
		// alert(value + " / " + text);
		
		document.getElementById("demo").innerText = value + " / " + text;
	}
	*/
</script>
