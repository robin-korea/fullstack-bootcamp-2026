<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    background:#f4f6f9;
    font-family:"Malgun Gothic","맑은 고딕",sans-serif;
}
.container{
    width:900px;
    margin:40px auto;
    background:white;
    border:1px solid #ddd;
    border-radius:8px;
    padding:25px;
}
h2{
    text-align:center;
    margin-bottom:25px;
    color:#0d6efd;
}
table{
    width:100%;
    border-collapse:collapse;
}
th{
    width:150px;
    background:#0d6efd;
    color:white;
    padding:8px;
    border:1px solid #ddd;
}
td{
    padding:8px;
    border:1px solid #ddd;
}
input, select, textarea{
    width:100%;
    padding:10px;
    font-size:15px;
    border:1px solid #ccc;
}
textarea{
    height:250px;
    resize:vertical;
}
.button-area{
    margin-top:20px;
    text-align:center;
}

.btn{
    display:inline-block;
    padding:10px 25px;
    text-decoration:none;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:15px;
    color:white;
}
.write{
    background:#0d6efd;
}
.cancel{
    background:#6c757d;
}
.btn:hover{
    opacity:.9;
}
</style>
</head>
<body>

   <!-- .container>h2+form>table -->
   <div class="container">
      <h2>게시판 글쓰기</h2>
      <form action="">
         <table>
            <!-- tr*10>td*2 -->
            <tr>
               <th>작성자</th>
               <td><input type="text" name="writer" autofocus="autofocus"></td>
            </tr>
            <tr>
               <th>비밀번호</th>
               <td><input type="password" name="pwd"></td>
            </tr>
            <tr>
               <th>이메일</th>
               <td><input type="email" name="email"></td>
            </tr>
            <tr>
               <th>제목</th>
               <td><input type="text" name="title"></td>
            </tr>
            <tr>
               <th>태그</th>
               		<td>
               			<div class ="bt">
               				<span><input type="radio" name="tag" checked="checked" value="0">TEXT </span>
               				<span><input type="radio" name="tag" value="1"> HTML </span>
               			</div>
               		</td>
            </tr>
            <tr>
               <th>내용</th>
               <td><textarea rows="" cols="" name="content"></textarea></td>
            </tr>
         </table>

         <!-- .button-area>button*2 -->
         <div class="button-area">
            <button class="btn write">등록</button>
            <button type="button" class="btn cancel" onclick="history.back();">취소</button>
         </div>
      </form>
   </div>
</body>
</html>
