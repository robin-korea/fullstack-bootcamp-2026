 <!-- 
 <img alt="" src="../images/img_pink_flowers.jpg" style="width:460px; height:345px">
 <br>
 <img alt="" src="../images/img_white_flower.jpg"  style="width:214px; height:204px">

<picture>
	<!-- 너비는 가로 사이즈 기준 
		 css 로 적용할 때는 @media (min-width:650px){} 설정한다.
	-->

	<!-- 너비가 최소 650 이상일 때 -->
	<source media="(min-width: 650px)" srcset="../images/img_pink_flowers.jpg">
	<!-- 너비가 최소 450 이상일 때 -->
	<source media="(min-width: 450px)" srcset="../images/img_white_flower.jpg">
	<!-- 그 외에는 -->
	<img alt="" src="../images/img_orange_flowers.jpg"  style="width:100px; height:135px">
</picture>
