	1. 이미지는 웹 페이지의 디자인과 모양을 개선할 수 있다.
	2. 인라인 모드/ 블럭 모드

 -->

<script>
 function dispCellphone() {
	// 디버깅
	// console.log("이벤트 확인...");
	// 1. <img class="photo-frame" src="./../images/cellphone.jpg" alt="전화기이미지"> 요소 얻어오기
	const imgCellphone = document.getElementById("cellphone");
	var url = imgCellphone.src;
	location.href = url;
 }
</script>
