<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
 /*
 스타일적용대상(selector){
	속성:속성값;
	속성:속성값;
	속성:속성값;
	:
 }
 */
 
 body{
 	border: 1px solid gray;
 }
 
 h1, h2, h3, h4, h5, h6{
 	color: yellow;
 }
 
 
</style>
</head>
<body>

<!-- <hr 속성명="속성값" 속성명="속성값" 속성명="속성값"> -->
<hr color = "red" width="50%">
<hr color = "blue" width="200px" size="10">
<!-- HTML 에서 단위를 생략하면 px 이다 -->

<!-- W3C HTML 의 태그는 대소문자를 구분하지 않지만 소문자 사용하기를 권장 -->

<!-- h$*6>{Heading $} 
	h1~6: 머릿글, 웸 페이지에 표시 제목 또는 부제목
		  검색 엔진이 웹 페이지의 구조와 내용을 색인화한다.
		  바깥 여백, 굵게

-->
<h1>Heading 1</h1>
<h2>Heading 2</h2>
<h3>Heading 3</h3>
<h4>Heading 4</h4>
<h5>Heading 5</h5>
<h6>Heading 6</h6>

</body>
</html>
