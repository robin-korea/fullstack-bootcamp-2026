<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인 폼</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f4f6f9;
    font-family:"맑은 고딕", sans-serif;
}

.container{
    width:420px;
    margin:80px auto;
    background:#fff;
    border-radius:10px;
    padding:35px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.container h2{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

.form-group{
    display:flex;
    align-items:center;
    margin-bottom:18px;
}

.form-group label{
    width:90px;
    font-weight:bold;
    color:#555;
}

.form-group input{
    flex:1;
    height:42px;
    padding:0 12px;
    font-size:15px;
    border:1px solid #ccc;
    border-radius:6px;
    outline:none;
    transition:.3s;
}

.form-group input:focus{
    border-color:#4CAF50;
    box-shadow:0 0 5px rgba(76,175,80,.3);
}

.btn-area{
    margin-top:30px;
    text-align:center;
}

.btn-area button{
    width:100%;
    height:45px;
    border:none;
    background:#4CAF50;
    color:white;
    font-size:16px;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
    transition:.3s;
}

.btn-area button:hover{
    background:#43a047;
}
</style>

</head>
<body>

<div class="container">

    <h2>로그인</h2>

    <form action="ex10_ok.jsp" method="get">

        <div class="form-group">
            <label for="userid">아이디</label>
            <input
                type="text"
                id="userid"
                name="userid"
                autofocus
                tabindex="1"
                placeholder="아이디를 입력하세요">
        </div>

        <div class="form-group">
            <label for="pwd">비밀번호</label>
            <input
                type="password"
                id="pwd"
                name="pwd"
                maxlength="15"
                tabindex="2"
                placeholder="비밀번호를 입력하세요">
        </div>

        <div class="btn-area">
            <button type="submit">로그인</button>
        </div>

    </form>

</div>

</body>
</html>
```
