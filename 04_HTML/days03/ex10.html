 <form id="loginForm" action="ex10_ok.jsp" method="get">
   <label for="id">아이디</label>
   <input type="text" value="admin" id="id" name="id" autofocus="autofocus" tabindex="1" placeholder="아이디 입력하세요">

 </form>
 
 <script>
   function btnLogin_click() {
	  alert("입력값에 대한 유효성 검사를 마친 후 js 서브밋시킨다.");
	  const form = document.querySelector("#loginForm"); 
	  form.submit();
   }
 </script>
