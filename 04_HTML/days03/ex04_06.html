<style>

    display: grid;

    align-items: end;

    align-content: center;
    grid-auto-flow: row;

     [ CSS grid 배치 ]

       ㄴ Flexbox가 한 방향(가로 또는 세로)의 배치에 강하다면, Grid는 가로와 세로를 모두 한 번에 배치할 수 있어 복잡한 레이아웃을 만들기에 적합하다
 -->
