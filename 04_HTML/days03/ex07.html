<script>
	function init() {
		console.log("> init() 호출됨...: 초기화");

		dispClock("box1"); // div의 아이디값 매개변수
	}

	function dispClock(id) {
		// js :  var, const, let 키워드
		let clockDiv = document.querySelector("#box1");

		const now = new Date();

		// 연도, 월, 일, 시, 분, 초를 따로 추출
		const year = now.getFullYear();
		const month = now.getMonth() + 1; // 월은 0부터 시작하므로 1을 더함
		const day = now.getDate();
		const hours = now.getHours();
		const minutes = now.getMinutes();
		const seconds = now.getSeconds();

		clockDiv.innerText = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
		
		setTimeout( dispClock  , 1000);
	}
</script>
</head>
<body onload="init();" onunload="">
