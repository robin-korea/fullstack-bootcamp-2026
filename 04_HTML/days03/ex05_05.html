<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grid Layout</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
}

#header{
    background:#666;
    color:white;
    padding:30px;
    text-align:center;
    font-size:35px;
}

#footer{
    background:#777;
    color:white;
    padding:20px;
    text-align:center;
    font-size:25px;
}

/* ===========================
   Grid Layout
=========================== */

#section{

    display:grid;

    /* 30% : 70% */
    grid-template-columns:30% 70%;

    min-height:500px;
}

#nav{
    background:#ccc;
    padding:20px;
}

#article{
    background:#f1f1f1;
    padding:20px;
}

ul{
    padding-left:20px;
}

</style>

<style>

/* 반응형 */

@media screen and (max-width:800px){

    #section{

        grid-template-columns:1fr;

    }

}

</style>

</head>

<body>

<div id="header">
    <h2>Cities - Grid Layout</h2>
</div>

<div id="section">

    <div id="nav">

        <ul>
            <li><a href="#">London</a></li>
            <li><a href="#">Paris</a></li>
            <li><a href="#">Seoul</a></li>
        </ul>

    </div>

    <div id="article">

        <h2>London</h2>

        <p>Lorem ipsum dolor sit amet...</p>

        <p>Lorem ipsum dolor sit amet...</p>

        <h2>Paris</h2>

        <p>Lorem ipsum dolor sit amet...</p>

        <p>Lorem ipsum dolor sit amet...</p>

        <h2>Seoul</h2>

        <p>Lorem ipsum dolor sit amet...</p>

        <p>Lorem ipsum dolor sit amet...</p>

    </div>

</div>

<div id="footer">
    <h2>Footer</h2>
</div>

</body>
</html>
