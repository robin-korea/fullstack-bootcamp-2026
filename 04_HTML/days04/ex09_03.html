<!-- 
	[html 웹페이지에서 비디오 재생시키는 가장 쉬운 방법: 유튜브]
	1. Youtube 동영상 업로드
	2. 동영상 ID
	3. iframe 을 사용해서 src 속성 = 동영상 ID로 URL 설정
	4. ㄴ 너비, 높이 설정
	    https://www.youtube.com/embed/tgbNymZ7vqY
 -->
 <iframe src = "https://www.youtube.com/embed/tgbNymZ7vqY?autoplay=1&mute=1" width="420" height="315"></iframe>
 
 <!-- loop=1 무한반복, loop=0 한번만 반복 -->
 <iframe src = "https://www.youtube.com/embed/tgbNymZ7vqY?loop=1&controls=1" width="420" height="315"></iframe>
 
</body>
