<script>
  function init(){
	  const volumnRange = document.querySelector("input[type=range]");
	  const demo = document.querySelector("#demo");
	  
	  volumnRange.addEventListener("input", function (e){
		  // console.log(volumnRange.value);
		  // console.log("> " + this.value);
		  console.log(">> " + e.target.value);
		  
		  demo.innerHTML = `<span style='color:red'>${volumnRange.value}</span>`;
		  demo.style.fontSize = e.target.value + "px";
	  });
