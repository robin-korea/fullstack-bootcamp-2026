<!-- 
	1. 멀티미디어 ? 이미지, 음악, 비디오, 영화, 애니메이션 등등 모든 것을 멀티미디어
	2. 최초 웹 브라우저에서는 단일 색상의 텍스트만 지원 (글꼴 제한)
	  ㄴ 나중에는 글꼴, 색상, 이미지, 멀티미디어가 지원..
	3. 멀티미디어 파일 : .waw, .mp3, .mp4, wmv, avi 지원
	(참고) 비디오: mp4, webm, ogg 지원
	      오디오: mp3, wav, ogg 지원
	4. 웹 페이지에서 다양한 유형의 멀티미디어를 지원하는 태그 존재.
	  ㄴ 비디오를 표시 태그: <video>, 너비, 높이 설정(권장)
	  						ㄴ controls 속성을 사용해서 재생, 일시정지, 볼륨 등등 제어
	  						ㄴ 크롬 브라우저에서는 자동 재생 허용 X (음소거된 자동 재생은 허용)
 -->
 <video src="video2.mp4" width="320" height="240" controls="controls"></video>
 
 <!-- 만약에 비디오 파일 형식을 지원하지 않으면 -->
  <video width="320" height="240" autoplay="autoplay" muted="muted" controls="controls">
  	<source src="movie.mp4" type="video/mp4">
  	<source src="movie.ogg" type="video/ogg">
  	현재 브라우저에서는 비디오 파일 형식이 지원되지 않습니다.
  </video>
  
  <hr>
  <!-- mp3는 압축된 오디오 파일 형식에 가장 적합한 형식 -->
  <audio controls="controls">
  	<source src="movie.mp3" type="audio/mpeg">
  	<source src="movie.ogg" type="audio/ogg">
  	현재 브라우저에서는 오디오 파일 형식이 지원되지 않습니다.
  </audio> 
</body>
