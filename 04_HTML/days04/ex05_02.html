볼륨: <input type="range" min="0" max="100" value="10">
<div id="demo"></div>

<script>
  $("#demo").html(`<span style='color:red'>${$("input[type=range]").val()}</span>`);
  
  // [jq 수정] innerText == text(), innerHTML == html()
  $("input[type=range]").on("input", function (){
	 // console.log($(this).val());
	 $("#demo")
	 	.html(`<span style='color:red'>${$(this).val()}</span>`)
	 	.css("font-size",$(this).val()+"px");
  });
</script>
