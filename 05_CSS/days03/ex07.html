<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name ="viewport" content ="width=device-width, initial-scale=1.0">
<title>2026. 7. 20. 오후 2:17:43</title>
<link rel="shortcut icon" type="image/x-icon" href="/images/SiSt.ico">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>

.container{
    position: relative;
  }
  .blackbox{
    position: relative;
    background-color: black;
    color:white;
    
    height: 100px;
    margin: 30px;
    
    z-index: 1;
 
  }
  .graybox{
    position: absolute;
    background-color: gray;
    
    height: 60px;
    width:70%;
    
    left:50px;
    top:50px;
    
    z-index: 3;
 
  }
  .greenbox{
    /* block 모드는 width 속성값은 100% 이지만 
       position: absolute; 로 설정하면 너비는 내용만큼 설정된다.
    */ 
    position: absolute;
    background-color: green;
    
    height: 100px;
    
    left:270px;
    top:-15px;
    
    z-index: -1;
 
  }
</style>
</head>
<body>
<!-- 요소를 배치하다보면
     다른 요소와 겹쳐지는 경우가 있다.
     z-index 속성으로 겹쳐지는 순서를 지정할 수 있다.
     양수: 위
     음수: 아래
 -->

<div class="container">
	<div class="blackbox">Black Box</div>
	<div class="graybox">Gray Box</div>
	<div class="greenbox">Green Box</div>
</div>

</body>
</html>
