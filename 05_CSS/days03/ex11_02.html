<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
	div.center{
		border: 3px solid #72ad21;
		width: 50%;
		/* 수평 가운데 정렬 */
		height: 200px;
		
		position: relative;
	}
	
	div.center > div{
		border: 1px solid red;
		
		position: absolute;
		left: 50%;
		top: 50%;
		
		/* 현재 요소를 x 축으로 반 이동, y 축으로 높이 반 이동*/
		transform: translate(-50%, -50%);
	}
</style>
</head>
<body>
<!-- 세로(수직) 정렬
	1) flexbox: align-items: center; *** 권장
	2) grid   : place-items: center;
	3) 좌표(위치 변환)
 -->
 
 <div class="center">
 	<div>Hello World!</div>
 </div>
</body>
