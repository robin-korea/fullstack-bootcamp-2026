<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
</style>
</head>
<body>
<label for="itemCount">항목수: </label>
 <select id="itemCount">
   <option>선택</option>
 </select>
 
 <div id="output"></div>
 
 <script>
   // ex05_03.html를 jq 사용해서 수정.
   for (var i = 1; i <= 15; i++) {
	$("#itemCount").append($("<option></option>").val(i).text(`${i}개`));
  }
  
   $("#itemCount").on("change", function(){
	   
	   $("#output").empty();
	  
	  // alert($(this).val());
	  for (var i = 1; i <= $(this).val(); i++) {
		$("#output")
		    .append(`${i}: `)
		    .append($('<input>').attr('type','text'))
		    .append("<br>");
  	  }
   });
 </script>
</body>
</html>
