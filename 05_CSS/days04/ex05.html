<style>
  *{
  	box-sizing: border-box;
  }
  
  body{
  	border: 1px solid red;
  	padding: 20px;
  	font-family: Arial;
  	
  	margin: 0 auto;
  	max-width: 800px;
  	height: 100%;
  }
  
  .row::after{
  	content: "";
  	clear: both;
  	display: table;
  }
</style>
<style>
  /* 막대그래프 그리기 */
  .row .side{
  	float: left;
  	width: 15%;
  	margin-top: 10px;
  }
  .row .middle{
  	float: left;
  	width: 70%;
  	margin-top: 10px;
  }
  .row .middle .bar-container{
  	width: 100%;
  	background-color: #f1f1f1;
  	text-align: center;
  	color: white;
  }
  .row .middle .bar-1{
  	background-color: red;
  	height: 18px;
  	width: 20%;
  }
  
  .row .middle .bar-2{
  	background-color: green;
  	height: 18px;
  	width: 80%;
  }
  
  .row .middle .bar-3{
  	background-color: blue;
  	height: 18px;
  	width: 55%;
  }
  
  .row .right{
  	text-align: right;
  }
</style>

<body>
<h3>설문조사 - 막대그래프</h3>
<!-- .row>.side>div^.middle>.bar-container>.bar-1 -->
<div class="row">
  <div class="side">
    <div>1 star</div>
  </div>
  <!-- ■■■■■■■■■■■ -->
  <div class="middle">
    <div class="bar-container">
      <div class="bar-1"></div>
    </div>
  </div>
  <div class="side right">
    <div>20</div>
  </div>
</div>

<div class="row">
  <div class="side">
    <div>2 star</div>
  </div>
  <!-- ■■■■■■■■■■■ -->
  <div class="middle">
    <div class="bar-container">
      <div class="bar-2"></div>
    </div>
  </div>
  <div class="side right">
    <div>80</div>
  </div>
</div>

<div class="row">
  <div class="side">
    <div>3 star</div>
  </div>
  <!-- ■■■■■■■■■■■ -->
  <div class="middle">
    <div class="bar-container">
      <div class="bar-3"></div>
    </div>
  </div>
  <div class="side right">
    <div>55</div>
  </div>
</div>

<script>
	// jq
	let n = Math.random();
 	let min = 0, max = 100;
 	
	$(".row .middle .bar-container div").each(function (index,element){
		n = Math.floor(Math.random() * (max - min + 1)) + min;
		$(element)
			.css("width",`${n}%`)
			// .parent().parent().next().first().text(`${n}%`);
			.closest(".middle").next().first().text(`${n}%`);
	});	
</script>
