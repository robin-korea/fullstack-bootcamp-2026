<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name ="viewport" content ="width=device-width, initial-scale=1.0">
<title>2026. 7. 22. 오후 12:16:22</title>
<link rel="shortcut icon" type="image/x-icon" href="/images/SiSt.ico">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
	div{
		width:100px;
		height:100px;
		background-color: red;
		
		/* animation-name: sample;
		animation-duration: 4s;  애니메이션 효과 완료하는 데 걸리는 시간
		animation-timing-function: linear;  등속 
		animation-fill-mode: forwards;
		
		animation-delay: 2s;
		
		animation-iteration-count:3;    무한반복 infinite 
		
		animation-direction: alternate-reverse;
		/* 애니메이션 시작 전, 종료 후 요소의 스타일 유지
		forward; 종료시 마지막 키 프레임 스타일 유지
		backwards; 시작 */
		
		
		animation: sample 4s linear 2s 3 alternate-reverse;
	}
	
	@keyframes sample{
		from{
			background-color: red;
		}
		to{
			background-color: yellow;
		}
	}
</style>
</head>
<body>
<!--     [css 애니메이션(animation)]
		 애니메이션? 하나의 스타일에서 점차적으로 다른 스타일로 변환되는 것.
		 [css 애니메이션 처리 - 키 프레임을 지정]
		 키 프레임(key frame) ? 특정 시간에 가지는 요소의 스타일
		 @keyframes 규칙 내에서 css 스타일 지정.
		 		ㄴ animation-name
     			ㄴ animation-duration
     			ㄴ animation-delay
     			ㄴ animation-iteration-count
     			ㄴ animation-direction
     			ㄴ animation-timing-function
     			ㄴ animation-fill-mode
     			약식 animation 
-->    
<div></div>


</body>
</html>
