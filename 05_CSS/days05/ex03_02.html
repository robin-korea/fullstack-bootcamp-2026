<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name ="viewport" content ="width=device-width, initial-scale=1.0">
<title>2026. 7. 22. 오전 11:26:23</title>
<link rel="shortcut icon" type="image/x-icon" href="/images/SiSt.ico">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
	#rotate2D, #rotate3D{
		width: 80px;
		height: 70px;
		
		color: white;
		
		font-weight: bold;
		font-size: 15px;
		padding: 10px;
		
		background-color: red;
		margin: 10px;
		border-radius: 5px;
		border: 1px solid #000;
		
		float: left;
	}
</style>
</head>
<body>
<div style="height: 80px">
   <div id="rotate2D" onmouseover="rotate2d()">rotate2D</div>
   <div id="rotate3D" onmouseover="rotate3d()">rotate3D</div>
</div>

<script>
	let angle2d = 0, angle3d = 0;
	let timer2d, timer3d;
	
	const target2d = document.querySelector("#rotate2D");
	const $target3d = $("#rotate3D");
	
	// 마우스를 올리면 회전
	function rotate2d(){
		clearInterval(timer2d); // 먼저 회전 중인 것은 중지
		timer2d = setInterval(() => {
			target2d.style.transform = `rotate(${angle2d++}deg)`;
			if (angle2d == 180 || angle2d == 360) {
				clearInterval(timer2d);
				if (angle2d == 360) {
					angle2d = 0;
				}
			}
		}, 10);
	}
	
	function rotate3d(){
		clearInterval(timer3d);
		timer3d = setInterval(() => {
			$target3d.css("transform", `rotateX(${angle3d++}deg)`);
		}, 10);
	}
</script>
</body>
</html>
