<style>
	div{
		width: 200px;
		height: 150px;
	}
	
	#grad1{
		/* 선형 그라데이션 효과 : 직선으로 진행되는 색상의 변화를 정의
			background-image: linear-gradient(방향, 색상 정지점1, 색상 정지점2)
			방향을 생략하면 기본값: 위 -> 아래 (==180deg)
		*/
		/* background-image: linear-gradient(red, yellow); */
/* 		background-image: linear-gradient(to right, red, yellow);
 */		background-image: linear-gradient(to bottom right, red, yellow);
 
 		/* 만약 브라우저에서 그라데이션 효과를 지원하지 않으면 첫 번째 red가 적용된다. */
	}
	
	#grad2{
		/* 방사형 그라데이션 효과: 중심점에서 바깥쪽으로 갈수록 색상이 변화*/
		/* background-image: radial-gradiant(모양, 색상, 색상)
		   모양 기본값: 타원 */
		background-image: radial-gradient(circle, red 5%, green 15%, blue 60%);
	}
</style>
</head>
<body>
<!-- 
	[ 그라데이션 ]
	   ㄴ 두 개 이상의 색상 간에 부드러운 전환 효과
	   ㄴ 1) 선형 그라디언트
	      2) 방사형 그라디언트
	      3) 원추형 그라디언트
 -->
 
 <div id="grad1"></div>
 <div id="grad2"></div>
