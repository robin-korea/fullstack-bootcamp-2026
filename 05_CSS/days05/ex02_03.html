<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name ="viewport" content ="width=device-width, initial-scale=1.0">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
	div{
		width: 300px;
		height: 100px;
		background-color: yellow;
		border: 1px solid;
	}
</style>
</head>
<body>
<input id="rdoClockWise" type="radio" name="direction" value="1" checked="checked">
<label for="rdoClockWise">시계방향</label>

<input id="rdoReverseClockWise" type="radio" name="direction" value="-1">
<label for="rdoReverseClockWise">반시계방향</label>

<br> 회전속도 :
<input type="range" min="10" max="1000" value="10" id="rspeed">
<br>
<button>회전 시작</button>
<button disabled="disabled">회전 멈춤</button>

<script>
	// jq
	
	const $btnStart = $("body > button:first-of-type");
	const $btnStop = $("body > button:last-of-type");
	const $rotateSpeed = $("#rspeed");
	
	let direction = 1;
	let angle = 1;
	let timer;
	
	$btnStart.on("click", function(){
		direction = $("input[name='direction']:checked").val();
		timer = setInterval(targetRotate, $rotateSpeed.val());
		$btnStart.prop("disabled", true);
		$btnStop.prop("disabled", false);
	});
	
	function targetRotate(){
		$("body > div").css("transform",`rotate(${angle}deg)`);
		angle += Number(direction);	
	}
	
	$btnStop.on("click", function(){
		clearInterval(timer);
		$btnStart.prop("disabled", false);
		$btnStop.prop("disabled", true);
	});
</script>
