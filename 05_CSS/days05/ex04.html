	div{
		width: 100px;

		display: inline-block;
		
		/* 속성 값이 바뀔 때 부드럽게 전환 */
		/*
		transition-property: width;
		transition-duration: 2s;
		transition-timing-function: ease;

		transition-timing-function: ease;
		transition-delay: 1s;

		/* transition: width 2s ease, height 2s, transform 2s; */
		transition: 2s ease;
	}
	
	div:hover{
		width: 200px;
		height: 200px;
		
		/* 이동, 회전, 크기, 기울이기 */
		transform: rotate(180deg); 
	}
</style>

	transition: 약식
	
	transition-property: 전환 속성
	transition-duration: 전환 지속 시간 2s 초
	transition-timing-function: 전환 효과 속도 곡선 ease( 기본값 )
