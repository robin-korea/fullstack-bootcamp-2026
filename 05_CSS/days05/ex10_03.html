<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name ="viewport" content ="width=device-width, initial-scale=1.0">
<title>2026. 7. 22. 오후 3:34:27</title>
<link rel="shortcut icon" type="image/x-icon" href="/images/SiSt.ico">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>

	/* 전역변수 선언  */
	:root{
		--blue: #1e90ff;
		--white: #fff;
	}
	body{
		background-color: var(--blue);
	}
	
	h2{
		border-bottom: 2px solid var(--blue);
	}
	
	.container{
		/* 지역변수 선언 */
		--button-blue: #0000ff;
		--fontsize: 50px;
		/* 전역변수 --blue를 지역변수 재정의 할 수 있다. */
		
		--blue: #ff00ff;
		
		color: var(--button-blue);
		background-color: var(--white);
		padding: 15px;
		
		font-size: var(--fontsize);
	}
	
	button{
		background-color: var(--white);
		color: var(--blue);
		border: 1px solid var(--blue);
		padding: 5px;
	}
</style>
<style>
	/* 화면이 450px 이상되면 {} 스타일 적용 */
	@media screen and (min-width: 450px){
		.container{
			--fontsize: 25px;
		}
	}
</style>
</head>
<body>
<h1>The Traditional Way</h1>

<div class="container">
  <h2>Lorem Ipsum</h2>
  <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Etiam semper diam at erat pulvinar, at pulvinar felis blandit.</p>
  <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Etiam semper diam at erat pulvinar, at pulvinar felis blandit.</p>
  <p>
    <button onclick="getFunc();">Yes</button>
    <button onclick="setFunc();">No</button>
  </p>
</div> 

<script>
	var r = document.querySelector(':root');
	
	function getFunc(){
		// :root 의 지정된 스타일을 getComputedStyle() 함수로 얻어온다
		var rs = getComputedStyle(r);
		console.log(rs);
		var color = rs.getPropertyValue("--blue");
		alert(color);
	}
	
	function setFunc(){
		r.style.setProperty("--blue","red");
	}
</script>
</body>
</html>
