<body>
<header>
  <h1 class="main"><a href="#" style="position: absolute;top:30px;">My Home</a></h1>
  <ul>
    <li><a href="#">로그인</a></li>
    <li><a href="#">회원가입</a></li>
  </ul>
</header>
<div>
	<xmp class="code">
	  [js 동적 요소 생성, 추가, 수정, 삭제]
	  생성: createElement()
	  추가: appendChild(), insertBefore();
	  삭제: removeChild()
	  교체: replaceChild()
	  	   hasChildNode()
	</xmp>
	
	좋아하는 과목을 선택하세요? 
	<br>
	<select id="subject" name="subject">
		<option>선택하세요...</option>
	</select>
	<br>
	<button>확인</button>
	<p id="demo">eng / 영어</p>
</div>

<script>
	const subject = $("#subject");
	
	const opArr = ["kor", "eng", "mat"]
	const opTextArr = ["국어","영어","수학"]
	opArr.forEach((element, index)=>{
		/* [1]$("<option></option>")
			.attr("value", element)
			.text(opTextArr[index]) */
		// [2]$(`<option value='${element}'>${opTextArr[index]}</option>`)
		$("<option></option>",{
			value: element,
			text: opTextArr[index]
		}).appendTo(subject);
	});
	
	// 확인 버튼을 클릭
	$("button").on("click",function(){
		let text = $("#subject option:selected").text();
		$("#demo").text(subject.val() + " / " + text);
	});
	
	// select 태그에 옵션을 선택하면 change 이벤트가 발생..
	$("#subject").on("change",function(){
		$("button").click();
	})
</script>
</body>
