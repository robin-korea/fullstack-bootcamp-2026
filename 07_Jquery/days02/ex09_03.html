<body>
	<header>
		<h1 class="main">
			<a href="#" style="position: absolute; top: 30px;">My Home</a>
		</h1>
		<ul>
			<li><a href="#">로그인</a></li>
			<li><a href="#">회원가입</a></li>
		</ul>
	</header>
	<div>
		<xmp class="code"> </xmp>
		<label for="n">정수 n 입력: </label> <input type="text" id="n"
			class="short" autofocus="autofocus">
		<p id="demo" style="color: red"></p>
	</div>

	<script>
		let txtN = $("#n");
		let pDemo = $("#demo");

		txtN.on("keydown", function(e) {
			if (e.key == 'Enter') {
				let n = $(this).val().trim();
				let regexp = /^[1-9]\d*$/;
				if (!regexp.test(n)) {
					alert("1이상의 정수만 입력하세요!!!");
					txtN.focus();
					txtN.select();
					return;
				}
				
				let content = "";
				let sum = 0;
				for (var i = 1; i <= n; i++) {
					sum += i;
					content += i + (i == n ? "" : "+");
				}
				content += "=" + sum;
				pDemo.text(content);
			}
		});
	</script>
</body>
