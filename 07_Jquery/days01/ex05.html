<body>
<header>
  <h1 class="main"><a href="#" style="position: absolute;top:30px;">My Home</a></h1>
  <ul>
    <li><a href="#">로그인</a></li>
    <li><a href="#">회원가입</a></li>
  </ul>
</header>
<div>
	<xmp class="code">
		
	</xmp>
	
  <label for="name">RED : </label><br>  
  <input id="redrange" class="long" type="range" min="0" max="255" step="1">
  <br>
  <label for="name">GREEN : </label><br> 
  <input id="greenrange" class="long" type="range" min="0" max="255" step="1">
  <br>
  <label for="name">BLUE : </label><br>  
  <input id="bluerange" class="long" type="range" min="0" max="255" step="1">
  <br>
  <p>홍길동</p>
  
</div>
<script>
	const rangeInputs = $("input[type='range'][id$='range']");
	rangeInputs.each(function(index,element){
		// console.log(index + " : " + $(element).val());
		$(element).on("input", range_input);
	});
	
	/*
	$("p")
		.css("height", "200px")
		.css("font-size", "30px");
	*/
	const pObj = $("p");
	
	pObj.css({
		"height": "200px",
		"font-size": "30px"
	});
	
	function range_input(){
		let cRed = rangeInputs.eq(0).val();
		let cGreen = rangeInputs.eq(1).val();
		let cBlue = rangeInputs.eq(2).val();
		
		pObj
			.css("backgroundColor", `rgb(${cRed},${cGreen},${cBlue})`)
			.text(`rgb(${cRed},${cGreen},${cBlue})`);
	}
	
	range_input();
</script>
</body>
</html>
