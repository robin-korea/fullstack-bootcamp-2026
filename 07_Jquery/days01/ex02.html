	<div class="group">
		<label for="txtContent">내용 입력</label>
		<input type="text" id="txtContent" class="long" placeholder="내용 입력" autofocus="autofocus">
	</div>
	<br>
	<button class="add">실행(exec)</button>
	<br>
	<br>
	<div id="demo" class="code">결과: </div>
</div>
<script>
	$("button.add").on("click",function(){
		let content = $("#txtContent").val();
		$("#demo").html(`결과: <span style='color:red; font-size: 20px;'>${content}</span>`)
		$("#txtContent")
			.focus()
			.select();
	})
	
	$("#txtContent").on("keydown",function(e){
		if (e.key == "Enter"){
			$("button.add").click();
		}
	});
</script>
